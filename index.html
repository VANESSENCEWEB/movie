<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Moving Background Images Grid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Template com grade de imagens animada ao fundo" />

  <!-- 2 arquivos CSS — funciona com duplo clique no index.html -->
  <link href="css/variables.css" rel="stylesheet" />
  <link href="css/vendor-webflow.css" rel="stylesheet" />
  <link href="css/site.css" rel="stylesheet" />
  <link href="css/components/hero-video.css" rel="stylesheet" />

  <!-- Favicon -->
  <link href="images/favicon.ico" rel="shortcut icon" type="image/x-icon" />
  <link href="images/webclip.png" rel="apple-touch-icon" />
</head>

<body class="dark">

  <!-- ============================================
       HERO COM VÍDEO (Recife Flats)
       Troque o src em videos/meu-video.mp4
       Coloque seu .mp4 na pasta videos/
       ============================================ -->
  <section class="hero-video">
    <video
      class="hero-video__media"
      autoplay
      muted
      loop
      playsinline
      poster="images/fotos/mike-dorner.jpg"
    >
      <source src="videos/meu-video.mp4" type="video/mp4" />
    </video>

    <div class="hero-video__overlay"></div>
    <div class="hero-video__borda hero-video__borda--esq"></div>
    <div class="hero-video__borda hero-video__borda--dir"></div>

    <div class="hero-video__onda" aria-hidden="true">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,64 C360,120 720,0 1080,48 C1260,72 1380,96 1440,80 L1440,120 L0,120 Z" />
      </svg>
    </div>

    <div class="hero-video__conteudo">
      <a class="logo-link w-inline-block" href="#">
        <img alt="Logo" class="nephew-logo" loading="lazy" src="images/logo.svg" />
      </a>

      <div class="intro-section">
        <h1 class="main-heading">Um lugar de verdade pra ficar em Recife.</h1>
        <a class="primary-btn w-button" href="#">Consultar</a>
      </div>

      <div class="footer-container">
        <div class="footer--text">Feel free to clone this and use in your own projects.</div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
